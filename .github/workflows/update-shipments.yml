name: Update Shipments

on:
  repository_dispatch:
    types: [update-shipments]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Write shipments.json
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload.shipments) }}
        run: |
          node -e "
            const payload = process.env.PAYLOAD;
            const unquoted = JSON.parse(payload);
            const parsed = JSON.parse(unquoted);
            const fs = require('fs');
            fs.writeFileSync('shipments.json', JSON.stringify(parsed, null, 2));
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add shipments.json
          git diff --staged --quiet || git commit -m "Update shipments data"
          git pull --rebase origin main
          git push
